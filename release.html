<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="1C:RSV MCP Server — заметки о релизе. Что нового в каждой версии плагина.">
  <title>Релиз — 1C:RSV MCP Server</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="docs-v2.css">
  <style>
    /* Всю типографику даёт docs-v2.css (h1/h2/h3/p/ul/ol/table/code/hr —
       такие же, как в guide.html и tools.html). Здесь — только
       специфика страницы релиза. */
    .release-version-badge {
      display: inline-block;
      padding: 4px 14px;
      background: var(--accent-soft);
      border: 1px solid var(--accent-soft2);
      color: var(--accent-hi);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    .release-loading { color: var(--text-muted); padding: 40px 0; text-align: center; }
    .release-error {
      background: #fff3f3;
      border: 1px solid #ffcdcd;
      color: #a33;
      padding: 16px 20px;
      border-radius: 6px;
      margin: 20px 0;
    }
    /* Чтобы якоря из «Содержания» в тексте тоже прокручивались плавно и
       не уезжали под шапку — scroll-margin-top на всех h2/h3/h4. html уже
       даёт scroll-padding-top:64px (см. docs-v2.css), этого достаточно для
       кликов по sidebar; а на заголовки добавим небольшой scroll-margin
       на случай, если клик инициирован из самого контента. */
    .main h2[id], .main h3[id], .main h4[id] { scroll-margin-top: 72px; }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:16px;">
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <a href="index.html" class="logo">
        <span class="logo-badge">RSV</span>
        <span class="header-title">1C:RSV MCP Server</span>
        <span class="header-subtitle" id="pageSubtitle">Релиз</span>
      </a>
    </div>
    <div class="header-links">
      <a href="index.html#docs" class="hide-mobile">Документация</a>
      <a href="index.html" class="hide-mobile">Главная</a>
      <a href="https://t.me/edt_ai_1c" target="_blank">Telegram</a>
    </div>
  </div>
</header>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<nav class="sidebar" id="sidebar">
  <div class="nav-section">
    <span class="nav-section-title">Другие релизы</span>
    <a href="release.html?v=3.3.0" class="nav-link" id="nav-3.3.0">v3.3.0</a>
    <a href="release.html?v=3.2.0" class="nav-link" id="nav-3.2.0">v3.2.0</a>
    <a href="release.html?v=3.1.0" class="nav-link" id="nav-3.1.0">v3.1.0</a>
  </div>
  <div class="nav-section" id="tocSection" style="display:none;">
    <span class="nav-section-title">Содержание релиза</span>
    <div id="toc"></div>
  </div>
  <div class="nav-section">
    <span class="nav-section-title">Документация</span>
    <a href="guide.html" class="nav-link">Руководство пользователя</a>
    <a href="tools.html" class="nav-link">Описание инструментов</a>
  </div>
</nav>

<!-- ===== MAIN ===== -->
<main class="main">
  <div class="main-inner">
    <div id="versionBadge" class="release-version-badge"></div>
    <div id="content">
      <div class="release-loading">Загружаем заметки релиза…</div>
    </div>
  </div>
</main>

<!-- marked.js для рендера Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  // --- GFM-совместимый slug для заголовков ---
  // Правила GitHub: lowercase, убрать всё кроме букв/цифр/пробелов/дефисов,
  // каждый пробел → дефис (НЕ сжимать серии пробелов!).
  function slugify(s) {
    return (s || '')
      .toLowerCase()
      // оставляем: латиница, цифры, подчёркивание (\w), кириллица, пробел, дефис
      .replace(/[^\w\u0400-\u04FF\s-]/g, '')
      .replace(/\s/g, '-');
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // --- Хамбургер-меню (как в guide/tools) ---
  (function() {
    const hamb = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    function toggle() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
      hamb.classList.toggle('active');
    }
    hamb.addEventListener('click', toggle);
    overlay.addEventListener('click', toggle);
  })();

  // --- Загрузка, рендер MD, установка id, сборка TOC и scrollspy ---
  (async function() {
    const urlParams = new URLSearchParams(window.location.search);
    const version = (urlParams.get('v') || '3.3.0').trim();

    // Валидируем формат X.Y.Z, чтобы не было fetch на произвольный путь
    if (!/^\d+\.\d+\.\d+$/.test(version)) {
      renderError('Неверный формат версии. Ожидается X.Y.Z, например 3.3.0');
      return;
    }

    // Подсвечиваем текущий релиз в «Других релизах»
    const activeRelLink = document.getElementById('nav-' + version);
    if (activeRelLink) activeRelLink.classList.add('active');

    // Шапка страницы
    document.title = 'Релиз v' + version + ' — 1C:RSV MCP Server';
    document.getElementById('pageSubtitle').textContent = 'Релиз v' + version;
    document.getElementById('versionBadge').textContent = 'v' + version;

    const mdUrl = 'RELEASE-' + version + '.md';
    let mdText;
    try {
      const res = await fetch(mdUrl, { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      mdText = await res.text();
    } catch (e) {
      renderError('Не удалось загрузить заметки релиза (' + mdUrl + '): ' + e.message);
      return;
    }

    // Первый H1 в MD дублирует версию — убираем, чтобы не было «v3.3.0» дважды
    mdText = mdText.replace(/^#\s+.+\n+/, '');

    // Настройки marked
    marked.use({ gfm: true, breaks: false, pedantic: false });
    const html = marked.parse(mdText);

    const content = document.getElementById('content');
    content.innerHTML = html;

    // 1) Ставим id ВСЕМ h1–h4 внутри контента — чтобы ссылки из MD
    //    вида [раздел](#работа-с-формами) действительно работали.
    //    Алгоритм slug совпадает с GFM.
    const used = Object.create(null);
    content.querySelectorAll('h1, h2, h3, h4').forEach(h => {
      let slug = slugify(h.textContent);
      // GFM-коллизии: -1, -2, -3…
      let finalSlug = slug;
      let n = 1;
      while (used[finalSlug]) {
        finalSlug = slug + '-' + (n++);
      }
      used[finalSlug] = true;
      h.id = finalSlug;
    });

    // 2) Строим TOC в сайдбаре из h2
    buildToc(content);

    // 3) Scrollspy (копия логики из guide.html)
    initScrollspy();
  })();

  function renderError(msg) {
    document.getElementById('content').innerHTML =
      '<div class="release-error">' + escapeHtml(msg) +
      '<br><br><a href="index.html#docs">← К списку релизов</a></div>';
  }

  function buildToc(contentEl) {
    const headings = contentEl.querySelectorAll('h2');
    if (!headings.length) return;
    const toc = document.getElementById('toc');
    const section = document.getElementById('tocSection');
    toc.innerHTML = '';
    headings.forEach(h => {
      const a = document.createElement('a');
      a.href = '#' + h.id;
      a.className = 'nav-link sub';
      a.textContent = h.textContent;
      toc.appendChild(a);
    });
    section.style.display = '';
  }

  function initScrollspy() {
    const navLinks = document.querySelectorAll('.nav-link');
    const idToLink = {};
    navLinks.forEach(link => {
      const href = link.getAttribute('href');
      if (href && href.startsWith('#')) idToLink[href.slice(1)] = link;
    });
    const sections = Array.from(document.querySelectorAll('h2[id], h3[id], h4[id]'))
      .filter(s => idToLink[s.id]);

    let scrollspyLockedUntil = 0;
    function setActive(id) {
      // Снимаем active только у тех, которые внутри tocSection —
      // чтобы не затирать подсветку «nav-3.3.0» (текущий релиз).
      navLinks.forEach(l => {
        const href = l.getAttribute('href');
        if (href && href.startsWith('#')) l.classList.remove('active');
      });
      if (id && idToLink[id]) idToLink[id].classList.add('active');
    }
    function updateActiveNav() {
      if (Date.now() < scrollspyLockedUntil) return;
      let current = '';
      const threshold = Math.max(120, window.innerHeight / 3);
      for (const section of sections) {
        const top = section.getBoundingClientRect().top;
        if (top <= threshold) current = section.id;
        else break;
      }
      if (window.innerHeight + window.scrollY >= document.body.scrollHeight - 5) {
        if (sections.length > 0) current = sections[sections.length - 1].id;
      }
      setActive(current);
    }
    navLinks.forEach(link => {
      link.addEventListener('click', () => {
        const href = link.getAttribute('href');
        if (href && href.startsWith('#')) {
          setActive(href.slice(1));
          scrollspyLockedUntil = Date.now() + 800;
        }
      });
    });
    window.addEventListener('scroll', updateActiveNav, { passive: true });
    updateActiveNav();
  }
</script>
</body>
</html>
